<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .icon-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: inline-block;
        }
        canvas {
            border: 1px solid #ddd;
            margin: 10px;
        }
        h3 {
            margin: 0 0 10px 0;
        }
        .instructions {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Close Tabs AI - Icon Generator</h1>

    <div class="icon-container">
        <h3>16x16</h3>
        <canvas id="icon16" width="16" height="16"></canvas>
    </div>

    <div class="icon-container">
        <h3>48x48</h3>
        <canvas id="icon48" width="48" height="48"></canvas>
    </div>

    <div class="icon-container">
        <h3>128x128</h3>
        <canvas id="icon128" width="128" height="128"></canvas>
    </div>

    <div class="instructions">
        <h3>How to save icons:</h3>
        <ol>
            <li>Right-click on each icon above</li>
            <li>Select "Save Image As..."</li>
            <li>Save as: <code>icon16.png</code>, <code>icon48.png</code>, <code>icon128.png</code></li>
            <li>Save them in the extension folder: /Users/voy/dev/close-tabs-ai/</li>
        </ol>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;

            // Background
            ctx.fillStyle = '#3498db';
            ctx.fillRect(0, 0, size, size);

            // Draw "X" symbol (for closing tabs)
            ctx.strokeStyle = 'white';
            ctx.lineWidth = Math.max(2, size / 16);
            ctx.lineCap = 'round';

            const padding = size * 0.25;

            // First line of X
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(size - padding, size - padding);
            ctx.stroke();

            // Second line of X
            ctx.beginPath();
            ctx.moveTo(size - padding, padding);
            ctx.lineTo(padding, size - padding);
            ctx.stroke();

            // Add sparkle/AI element (small dots)
            ctx.fillStyle = 'white';
            const dotSize = Math.max(1, size / 32);

            // Top right sparkle
            ctx.beginPath();
            ctx.arc(size - padding/2, padding/2, dotSize, 0, Math.PI * 2);
            ctx.fill();

            // Bottom left sparkle
            ctx.beginPath();
            ctx.arc(padding/2, size - padding/2, dotSize, 0, Math.PI * 2);
            ctx.fill();
        }

        // Generate all three icon sizes
        drawIcon(document.getElementById('icon16'));
        drawIcon(document.getElementById('icon48'));
        drawIcon(document.getElementById('icon128'));
    </script>
</body>
</html>
