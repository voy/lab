<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <script src="index.js"></script>
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
            }

            input {
                padding: 10px;
                width: 60%;
                font-size: 14px;
                border: 2px solid #e0e0e0;
                border-radius: 4px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
                background: #3498db;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin-left: 10px;
            }

            button:hover {
                background: #2980b9;
            }

            .spinner {
                display: none;
                width: 50px;
                height: 50px;
                margin: 20px auto;
                position: relative;
            }

            .spinner.active {
                display: block;
            }

            .spinner::after {
                content: "";
                position: absolute;
                width: 40px;
                height: 40px;
                top: 5px;
                left: 5px;
                border-radius: 50%;
                border: 5px solid #f3f3f3;
                border-top-color: #3498db;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            #results {
                margin-top: 20px;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }

            .tab-item {
                padding: 6px 8px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                transition: all 0.2s;
            }

            .tab-item.matched {
                background: #d4edda;
                border-left: 4px solid #28a745;
            }

            .tab-item.unmatched {
                background: #f8f9fa;
                border-left: 4px solid #dee2e6;
                opacity: 0.6;
            }

            .indicator {
                font-size: 16px;
                margin-right: 8px;
                min-width: 20px;
            }

            .tab-title {
                font-weight: 500;
                color: #333;
                font-size: 13px;
            }

            .tab-url {
                font-size: 11px;
                color: #666;
                margin-top: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        </style>
    </head>
    <body>
        <input type="text" id="userQuery" placeholder="Give me all news sites">
        <button id="submit">Submit</button>
        <div class="spinner" id="spinner"></div>
        <div id="results"></div>
    </body>
</html>
