name: Sayyato Booker

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: false
        default: 'book'
        type: choice
        options: [book, sync, debug, list, book-all]

jobs:
  book:
    runs-on: ubuntu-latest
    if: github.actor == 'voy'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Write config
        run: python3 sayyato-booker/write_config.py
        env:
          EMAIL:            ${{ secrets.SAYYATO_EMAIL }}
          PASSWORD:         ${{ secrets.SAYYATO_PASSWORD }}
          API_BASE:         ${{ secrets.SAYYATO_API_BASE }}
          CLUB_ID:          ${{ secrets.SAYYATO_CLUB_ID }}
          PLAN_ID:          ${{ secrets.SAYYATO_PLAN_ID }}
          DAYS_AHEAD:       ${{ secrets.SAYYATO_DAYS_AHEAD }}
          COURSES:          ${{ secrets.SAYYATO_COURSES }}
          TELEGRAM_TOKEN:   ${{ secrets.SAYYATO_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SAYYATO_TELEGRAM_CHAT_ID }}
          SKIP_GIST_URL:    ${{ secrets.SAYYATO_SKIP_GIST_URL }}

      - name: Run
        run: |
          python3 sayyato-booker/book.py ${{ github.event.inputs.command || 'book' }}
          if [ "${{ github.event.inputs.command || 'book' }}" = "book" ]; then
            python3 sayyato-booker/book.py sync
          fi
