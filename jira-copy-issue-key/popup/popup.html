<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
      width: 220px;
      padding: 14px;
    }

    #key {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 7px 0;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      background: #2a2a2a;
      color: #ccc;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s, color 0.1s;
    }

    button:hover {
      background: #333;
      color: #fff;
    }

    button.copied {
      border-color: #2d6a4f;
      background: #1b4332;
      color: #95d5b2;
    }

    #not-found {
      color: #888;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (prefers-color-scheme: light) {
      body { background: #f5f5f5; color: #1a1a1a; }
      #key { color: #000; }
      button { border-color: #d0d0d0; background: #fff; color: #333; }
      button:hover { background: #ebebeb; color: #000; }
      button.copied { border-color: #2d6a4f; background: #d8f3dc; color: #1b4332; }
      #not-found { color: #888; }
    }
  </style>
</head>
<body>
  <div id="found" hidden>
    <div id="key"></div>
    <div class="actions">
      <button id="copy-key">Copy key</button>
      <button id="copy-link">Copy link</button>
    </div>
  </div>
  <div id="not-found">No Jira issue detected.</div>
  <script src="popup.js"></script>
</body>
</html>
