<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grand-staff-quiz</title>
  <style>
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --accent-dim:  #1f6feb;
      --correct:     #2ea043;
      --correct-dim: #1a7431;
      --wrong:       #da3633;
      --wrong-dim:   #a3211e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #main-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 12px;
      gap: 8px;
    }

    #staff-container {
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      cursor: default;
    }

    #staff-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    #controls {
      width: 100%;
      max-width: 600px;
      padding: 8px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #answer-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .ans-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      max-width: 64px;
      height: 52px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
    }
    @media (hover: hover) {
      .ans-btn:hover:not(:disabled) { border-color: var(--accent-dim); }
    }
    .ans-btn:disabled { opacity: 0.5; cursor: default; }
    .ans-btn.correct { background: var(--correct);  border-color: var(--correct-dim); color: #fff; }
    .ans-btn.wrong   { background: var(--wrong);    border-color: var(--wrong-dim);   color: #fff; }

    #footer-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 2px;
    }

    #settings-btn, #toggle-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    #settings-btn:hover, #toggle-btn:hover { color: var(--text); }

    #config-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 4px;
    }
    #config-panel[hidden] { display: none; }

    #config-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    #config-btns {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }
    #reset-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    #reset-btn:hover { color: var(--text); }
    #config-done-btn {
      background: var(--surface);
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 20px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #config-done-btn:hover { border-color: #58a6ff; }

    #streak-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 16px;
    }

    /* ── Modal ── */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modal-backdrop.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #modal-title { font-size: 15px; font-weight: 600; }
    #modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }
    #modal-close:hover { color: var(--text); }

    .modal-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #midi-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    #midi-connect-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #midi-connect-btn:hover { border-color: var(--accent-dim); }
    #midi-name { color: var(--correct); font-size: 13px; }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .setting-row input[type="checkbox"] { cursor: pointer; accent-color: var(--accent-dim); width: 15px; height: 15px; }

    #textareas-row {
      display: flex;
      gap: 12px;
    }
    .clef-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .clef-editor label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .clef-textarea {
      width: 100%;
      height: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.8;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
    }
    .clef-textarea:focus { border-color: var(--accent-dim); }

    #modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 14px 20px;
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #modal-done-btn {
      background: var(--bg);
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 20px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #modal-done-btn:hover { border-color: #58a6ff; }


@media (max-width: 440px) {
      #main-area  { padding: 12px 8px 8px; }
      #controls   { padding: 8px 8px 16px; }
      #staff-container { padding: 6px 6px; }
      .ans-btn    { height: 44px; font-size: 16px; border-radius: 6px; }
      #answer-row { gap: 6px; }
    }
  </style>
</head>
<body>
  <main id="main-area">
    <div id="streak-row">
      <span id="accuracy"></span>
      <span id="speed"></span>
      <span id="streak-current"></span>
    </div>
    <div id="staff-container"></div>
  </main>

<footer id="controls">
    <div id="answer-row">
      <button class="ans-btn" data-note="A">A</button>
      <button class="ans-btn" data-note="B">B</button>
      <button class="ans-btn" data-note="C">C</button>
      <button class="ans-btn" data-note="D">D</button>
      <button class="ans-btn" data-note="E">E</button>
      <button class="ans-btn" data-note="F">F</button>
      <button class="ans-btn" data-note="G">G</button>
    </div>
    <div id="footer-bar">
      <button id="settings-btn">settings</button>
      <button id="toggle-btn">edit notes</button>
    </div>
    <div id="config-panel" hidden>
      <p id="config-desc">Choose which notes to drill. Prefix a line with # to skip it temporarily.</p>
      <div id="textareas-row">
        <div class="clef-editor">
          <label for="treble-textarea">Treble</label>
          <textarea id="treble-textarea" class="clef-textarea" spellcheck="false"></textarea>
        </div>
        <div class="clef-editor">
          <label for="bass-textarea">Bass</label>
          <textarea id="bass-textarea" class="clef-textarea" spellcheck="false"></textarea>
        </div>
      </div>
      <div id="config-btns">
        <button id="reset-btn">Reset to defaults</button>
        <button id="config-done-btn">Done</button>
      </div>
    </div>
  </footer>

  <div id="modal-backdrop">
    <div id="modal">
      <div id="modal-header">
        <span id="modal-title">Settings</span>
        <button id="modal-close">&#x2715;</button>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">MIDI</div>
        <div id="midi-row">
          <button id="midi-connect-btn">Connect MIDI</button>
          <span id="midi-name" hidden></span>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Debug</div>
        <label class="setting-row">
          <input type="checkbox" id="click-clef-check"> Click staff to answer
        </label>
      </div>

      <div id="modal-footer">
        <button id="modal-done-btn">Done</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vexflow@4/build/cjs/vexflow.js"></script>
  <script>
    // ── Default note pool ────────────────────────────────────────────
    const DEFAULT_TREBLE = `B3
C4
D4
E4
F4
G4
A4
B4
C5
D5
E5
F5
G5
A5`;
    const DEFAULT_BASS   = `E2
F2
G2
A2
B2
C3
D3
E3
F3
G3
A3
B3
C4
D4
E4`;

    const STORAGE_KEY = 'grand-staff-pool-v2';

    function parseClef(text, clef) {
      return text.replace(/\\n/g, '\n').split('\n')
        .map(l => l.trim())
        .filter(l => !/^(#|\/\/)/.test(l))
        .filter(l => /^[A-Ga-g]\d$/i.test(l))
        .map(l => ({ key: `${l[0].toLowerCase()}/${l[1]}`, clef, name: l[0].toUpperCase() }));
    }

    function loadTexts() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    function saveTexts(treble, bass) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        treble: treble.replace(/\\n/g, '\n'),
        bass:   bass.replace(/\\n/g, '\n'),
      }));
    }

    // ── VexFlow constants ────────────────────────────────────────────
    const { Renderer, Stave, StaveNote, GhostNote, Voice, Formatter, StaveConnector } = Vex.Flow;

    const STAFF_WIDTH = 400;
    const STAFF_LEFT  = 56;
    const STAVE_WIDTH = STAFF_WIDTH - STAFF_LEFT - 8;
    const TREBLE_Y    = 35;
    const BASS_Y      = 185;

    const staffContainer = document.getElementById('staff-container');

    function applyViewBox() {
      const svg = staffContainer.querySelector('svg');
      svg.setAttribute('viewBox', '10 45 400 240');
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.style.width = '100%';
      svg.style.height = 'auto';
    }

    let trebleStave = null, bassStave = null;

    function buildStaves(ctx, withTimeSig = true) {
      const treble = new Stave(STAFF_LEFT, TREBLE_Y, STAVE_WIDTH);
      treble.addClef('treble');
      if (withTimeSig) treble.addTimeSignature('4/4');
      treble.setContext(ctx).draw();

      const bass = new Stave(STAFF_LEFT, BASS_Y, STAVE_WIDTH);
      bass.addClef('bass');
      if (withTimeSig) bass.addTimeSignature('4/4');
      bass.setContext(ctx).draw();

      new StaveConnector(treble, bass).setType(StaveConnector.type.BRACE).setContext(ctx).draw();
      new StaveConnector(treble, bass).setType(StaveConnector.type.SINGLE).setContext(ctx).draw();

      trebleStave = treble;
      bassStave   = bass;
      return { treble, bass };
    }

    // ── Staff click → note ───────────────────────────────────────────
    // Bottom line of treble = E4, bottom line of bass = G2.
    // Each half-space up = one diatonic step.
    const STAFF_NOTE_NAMES = 'CDEFGAB';

    function yToNote(stave, svgY, clef) {
      const half      = stave.getSpacingBetweenLines() / 2;
      const bottomY   = stave.getYForLine(4);
      const steps     = Math.round((bottomY - svgY) / half);
      const [base, baseOct] = clef === 'treble' ? ['E', 4] : ['G', 2];
      const baseIdx   = STAFF_NOTE_NAMES.indexOf(base);
      const total     = baseIdx + steps;
      const name      = STAFF_NOTE_NAMES[((total % 7) + 7) % 7];
      const octave    = baseOct + Math.floor(total / 7);
      if (octave < 0 || octave > 9) return null;
      return { name, key: `${name.toLowerCase()}/${octave}` };
    }

    const clickClefCheck = document.getElementById('click-clef-check');
    clickClefCheck.checked = localStorage.getItem('click-clef') === 'true';
    function applyClickClef() {
      localStorage.setItem('click-clef', clickClefCheck.checked);
      staffContainer.style.cursor = clickClefCheck.checked ? 'crosshair' : 'default';
      document.getElementById('answer-row').style.display = clickClefCheck.checked ? 'none' : '';
    }
    clickClefCheck.addEventListener('change', applyClickClef);
    applyClickClef();

    staffContainer.addEventListener('click', e => {
      if (!clickClefCheck.checked || !trebleStave || !bassStave) return;
      const svg = staffContainer.querySelector('svg');
      if (!svg) return;
      const pt  = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const { x: svgX, y: svgY } = pt.matrixTransform(svg.getScreenCTM().inverse());

      // Ignore clicks outside the stave x-range (clef area)
      if (svgX < STAFF_LEFT) return;

      const trebleCenter = (trebleStave.getYForLine(0) + trebleStave.getYForLine(4)) / 2;
      const bassCenter   = (bassStave.getYForLine(0)   + bassStave.getYForLine(4))   / 2;
      const clef  = Math.abs(svgY - trebleCenter) <= Math.abs(svgY - bassCenter) ? 'treble' : 'bass';
      const stave = clef === 'treble' ? trebleStave : bassStave;
      const note  = yToNote(stave, svgY, clef);
      if (!note) return;
      handleAnswer(note.name, note.key, clef);
    });

    function renderBatch(notes, currentIdx, feedbackColor = null, wrongNote = null) {
      staffContainer.innerHTML = '';
      const renderer = new Renderer(staffContainer, Renderer.Backends.SVG);
      renderer.resize(STAFF_WIDTH, 265);
      const ctx = renderer.getContext();
      const { treble, bass } = buildStaves(ctx, false);

      const COLOR_DONE    = '#ccc';
      const COLOR_CURRENT = '#000';

      ['treble', 'bass'].forEach(clef => {
        const tickables = notes.map((n, i) => {
          if (n.clef === clef) {
            const sn = new StaveNote({ keys: [n.key], duration: 'q', clef });
            const color = i < currentIdx  ? (batchFeedback[i] ?? COLOR_DONE)
                        : i === currentIdx ? (feedbackColor ?? COLOR_CURRENT)
                        :                   COLOR_DONE;
            sn.setStyle({ fillStyle: color, strokeStyle: color });
            sn.setStemStyle({ strokeStyle: 'rgba(0,0,0,0)', fillStyle: 'rgba(0,0,0,0)' });
            return sn;
          }
          return new GhostNote({ duration: 'q' });
        });
        const voice = new Voice({ num_beats: notes.length, beat_value: 4 });
        voice.addTickables(tickables);
        new Formatter().joinVoices([voice]).format([voice], STAVE_WIDTH - 20);
        voice.draw(ctx, clef === 'treble' ? treble : bass);
      });

      // Wrong note: render as a second voice aligned to currentIdx
      if (wrongNote) {
        const tickables = notes.map((_, i) => {
          if (i === currentIdx) {
            const sn = new StaveNote({ keys: [wrongNote.key], duration: 'q', clef: wrongNote.clef });
            sn.setStyle({ fillStyle: '#da3633', strokeStyle: '#da3633' });
            sn.setStemStyle({ strokeStyle: 'rgba(0,0,0,0)', fillStyle: 'rgba(0,0,0,0)' });
            return sn;
          }
          return new GhostNote({ duration: 'q' });
        });
        const voice = new Voice({ num_beats: notes.length, beat_value: 4 });
        voice.addTickables(tickables);
        new Formatter().joinVoices([voice]).format([voice], STAVE_WIDTH - 20);
        voice.draw(ctx, wrongNote.clef === 'treble' ? treble : bass);
      }

      applyViewBox();
    }


function renderConfigView(notes) {
      staffContainer.innerHTML = '';
      const renderer = new Renderer(staffContainer, Renderer.Backends.SVG);
      renderer.resize(STAFF_WIDTH, 265);
      const ctx = renderer.getContext();
      const { treble, bass } = buildStaves(ctx, false);

      try {
        ['treble', 'bass'].forEach(clef => {
          const sample = (notes || []).filter(n => n.clef === clef);
          if (sample.length === 0) return;
          const staveNotes = sample.map(n => new StaveNote({ keys: [n.key], duration: 'q', clef }));
          const voice = new Voice({ num_beats: sample.length, beat_value: 4 });
          voice.addTickables(staveNotes);
          new Formatter().joinVoices([voice]).format([voice], STAVE_WIDTH - 20);
          voice.draw(ctx, clef === 'treble' ? treble : bass);
        });
      } catch (_) { /* VexFlow can't fit notes — show empty staves */ }

      applyViewBox();
    }

    // ── State ────────────────────────────────────────────────────────
    let pool        = [];
    let currentNote = null;
    let batch         = [];
    let batchFeedback = [];
    let batchIdx      = 0;
    let phase       = 'idle';
    let configOpen  = false;
    let streak          = 0;
    const ACCURACY_WINDOW = 20;
    let answerHistory   = [];
    const SPEED_WINDOW    = 20;
    const SPEED_MIN_ACC   = 0.80;
    const SPEED_MIN_N     = 3;
    let speedHistory    = [];
    let questionStartTime = 0;

    let lastStepDir     = 0;
    let lastClefRun     = 0;

    // ── Game logic ───────────────────────────────────────────────────
    const NOTE_ORDER = 'ABCDEFG';

    function stepDir(a, b) {
      if (!a || !b) return 0;
      const d = NOTE_ORDER.indexOf(b.name) - NOTE_ORDER.indexOf(a.name);
      return (d === 1 || d === -6) ? 1 : (d === -1 || d === 6) ? -1 : 0;
    }

    function isValidNext(n, prev, lastDir) {
      if (!prev) return true;
      if (n.name === prev.name) return false;
      const dir = stepDir(prev, n);
      if (dir !== 0 && dir === lastDir) return false; // no consecutive same-direction steps
      return true;
    }

    function isLedgerNote(n) {
      const oct = parseInt(n.key.split('/')[1]);
      const val = oct * 7 + 'CDEFGAB'.indexOf(n.name);
      if (n.clef === 'treble') return val < 30 || val > 38; // outside E4–F5
      if (n.clef === 'bass')   return val < 18 || val > 26; // outside G2–A3
      return false;
    }

    function weightedShuffle(notes) {
      const weighted = notes.flatMap(n => isLedgerNote(n) ? [n, n] : [n]);
      weighted.sort(() => Math.random() - 0.5);
      const seen = new Set();
      return weighted.filter(n => {
        const id = n.key + n.clef;
        if (seen.has(id)) return false;
        seen.add(id);
        return true;
      });
    }



    function newBatch(prevNote = null) {
      const size = Math.min(3 + Math.round(Math.random()), pool.length);
      const shuffled = weightedShuffle(pool);
      batch = [];
      let prev = prevNote;
      let lastDir = lastStepDir;
      let clefRun = lastClefRun;
      const remaining = [...shuffled];
      for (let i = 0; i < size; i++) {
        const mustSwitch = prev && clefRun >= 2;
        let idx = mustSwitch
          ? remaining.findIndex(n => isValidNext(n, prev, lastDir) && n.clef !== prev.clef)
          : remaining.findIndex(n => isValidNext(n, prev, lastDir));
        if (idx === -1) idx = remaining.findIndex(n => isValidNext(n, prev, lastDir));
        if (idx === -1) idx = 0;
        const [chosen] = remaining.splice(idx, 1);
        batch.push(chosen);
        clefRun = prev && chosen.clef === prev.clef ? clefRun + 1 : 1;
        lastDir = stepDir(prev, chosen);
        prev = chosen;
      }
      lastStepDir  = lastDir;
      lastClefRun  = clefRun;
      batchIdx      = 0;
      batchFeedback = [];
    }

    function startQuestion() {
      if (pool.length === 0) return;
      if (batchIdx >= batch.length) {
        disableButtons();
        setTimeout(() => {
          newBatch(currentNote);
          currentNote = batch[batchIdx++];
          phase = 'question';
          questionStartTime = Date.now();
          renderBatch(batch, batchIdx - 1);
          enableButtons();
        }, 250);
        return;
      }
      currentNote = batch[batchIdx++];
      phase = 'question';
      questionStartTime = Date.now();
      renderBatch(batch, batchIdx - 1);

      enableButtons();
    }

    let feedbackTimer = null;

    function handleAnswer(name, key = null, clef = null) {
      if (phase === 'feedback' && feedbackTimer !== null) {
        clearTimeout(feedbackTimer);
        feedbackTimer = null;
        startQuestion();
      }
      if (phase !== 'question') return;
      phase = 'feedback';

      const isCorrect = key !== null ? key === currentNote.key : name === currentNote.name;
      document.querySelector(`.ans-btn[data-note="${name}"]`)
        .classList.add(isCorrect ? 'correct' : 'wrong');

      answerHistory.push(isCorrect);
      if (answerHistory.length > ACCURACY_WINDOW) answerHistory.shift();
      if (isCorrect) {
        streak++;
        speedHistory.push(Date.now() - questionStartTime);
        if (speedHistory.length > SPEED_WINDOW) speedHistory.shift();
      } else {
        streak = 0;
      }
      updateStreak();

      if (isCorrect) {
        batchFeedback[batchIdx - 1] = '#57ab6e'; // dimmed green for past state
        renderBatch(batch, batchIdx - 1, '#2ea043'); // bright green flash while still current
        startQuestion();
      } else {
        const wrongIdx = batchIdx - 1;
        batchFeedback[wrongIdx] = '#e09000'; // amber past state
        const wrongNote = key !== null
          ? { name, key, clef: clef ?? (parseInt(key.split('/')[1]) * 7 + 'CDEFGAB'.indexOf(name) >= 28 ? 'treble' : 'bass') }
          : null;
        renderBatch(batch, wrongIdx, '#e09000', wrongNote);
        feedbackTimer = setTimeout(() => {
          feedbackTimer = null;
          if (batchIdx >= batch.length) {
            newBatch(currentNote);
            currentNote = batch[batchIdx++];
            phase = 'question';
            renderBatch(batch, batchIdx - 1);
            enableButtons();
          } else {
            startQuestion();
          }
        }, 700);
      }

      setTimeout(clearFeedback, 400);
    }

    function updateStreak() {
      const n       = answerHistory.length;
      const correct = answerHistory.filter(Boolean).length;
      const pct     = n === 0 ? '—' : Math.round(correct / n * 100) + '%';
      const label   = n < ACCURACY_WINDOW ? `${correct}/${n}` : 'last 20';
      document.getElementById('accuracy').textContent       = `accuracy: ${pct} (${label})`;

      const accRate = n === 0 ? 0 : correct / n;
      const sn      = speedHistory.length;
      const speedEl = document.getElementById('speed');
      if (sn >= SPEED_MIN_N && accRate >= SPEED_MIN_ACC) {
        const avg      = speedHistory.reduce((a, b) => a + b, 0) / sn;
        const sLabel   = sn < SPEED_WINDOW ? `${sn}/${SPEED_WINDOW}` : 'last 20';
        speedEl.textContent = `speed: ${(avg / 1000).toFixed(1)}s (${sLabel})`;
      } else {
        speedEl.textContent = '';
      }

      document.getElementById('streak-current').textContent = `streak: ${streak}`;
    }

    function enableButtons()  { document.querySelectorAll('.ans-btn').forEach(b => b.disabled = false); }
    function disableButtons() { document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true); }
    function clearFeedback()  { document.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('correct', 'wrong')); }

    // ── Settings modal ───────────────────────────────────────────────
    const trebleTextarea = document.getElementById('treble-textarea');
    const bassTextarea   = document.getElementById('bass-textarea');
    const modalBackdrop  = document.getElementById('modal-backdrop');
    const configPanel    = document.getElementById('config-panel');
    const toggleBtn      = document.getElementById('toggle-btn');

    function openSettings() {
      configOpen = true;
      modalBackdrop.classList.add('open');
      phase = 'feedback';
      disableButtons();
      clearFeedback();
    }

    function closeSettings() {
      configOpen = false;
      modalBackdrop.classList.remove('open');
      if (!configPanel.hidden) return; // note editor still open, don't restart
      lastStepDir = 0;
      lastClefRun = 0;
      newBatch();
      startQuestion();
    }

    function openConfig() {
      configOpen = true;
      configPanel.hidden = false;
      toggleBtn.style.display = 'none';
      phase = 'feedback';
      disableButtons();
      clearFeedback();
      renderConfigView(pool);
    }

    function closeConfig() {
      configOpen = false;
      configPanel.hidden = true;
      toggleBtn.style.display = '';
      lastStepDir = 0;
      lastClefRun = 0;
      newBatch();
      startQuestion();
    }

    function refreshPool() {
      const parsed = [
        ...parseClef(trebleTextarea.value, 'treble'),
        ...parseClef(bassTextarea.value, 'bass'),
      ];
      if (parsed.length > 0) {
        pool = parsed;
        saveTexts(trebleTextarea.value, bassTextarea.value);
        renderConfigView(pool);
      }
    }

    let debounceTimer;
    [trebleTextarea, bassTextarea].forEach(ta => {
      ta.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(refreshPool, 300);
      });
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      trebleTextarea.value = DEFAULT_TREBLE;
      bassTextarea.value   = DEFAULT_BASS;
      pool = [
        ...parseClef(DEFAULT_TREBLE, 'treble'),
        ...parseClef(DEFAULT_BASS, 'bass'),
      ];
      saveTexts(DEFAULT_TREBLE, DEFAULT_BASS);
      renderConfigView(pool);
    });

    document.getElementById('modal-done-btn').addEventListener('click', closeSettings);
    document.getElementById('modal-close').addEventListener('click', closeSettings);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeSettings(); });
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    document.getElementById('config-done-btn').addEventListener('click', closeConfig);
    toggleBtn.addEventListener('click', openConfig);

    // ── Wire answer events ───────────────────────────────────────────
    document.querySelectorAll('.ans-btn').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn.dataset.note));
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && configOpen) {
        if (!modalBackdrop.classList.contains('open') && !configPanel.hidden) closeConfig();
        else closeSettings();
        return;
      }
      if (e.target.tagName === 'TEXTAREA' || configOpen) return;
      const note = e.key.toUpperCase();
      if ('ABCDEFG'.includes(note) && note.length === 1) handleAnswer(note);
      // ` — simulate a wrong MIDI answer: same note name, one octave up
      if (e.key === '`' && currentNote) {
        const octave = parseInt(currentNote.key.split('/')[1]) + 1;
        handleAnswer(currentNote.name, `${currentNote.name.toLowerCase()}/${octave}`);
      }
      // \ — force a batch of C4 treble notes for testing
      if (e.key === '\\') {
        const c4 = () => ({ key: 'c/4', clef: 'treble', name: 'C' });
        batch = [c4(), c4(), c4(), c4()];
        batchFeedback = [];
        batchIdx = 0;
        phase = 'question';
        startQuestion();
      }
    });

    // ── MIDI ─────────────────────────────────────────────────────────
    const MIDI_NAMES = ['C',null,'D',null,'E','F',null,'G',null,'A',null,'B'];

    let lastMidiNote = -1, lastMidiTime = 0;

    function onMIDIMessage(e) {
      const [status, note, velocity] = e.data;
      if ((status & 0xf0) !== 0x90 || velocity === 0) return;
      const name = MIDI_NAMES[note % 12];
      if (!name) return;
      const now = Date.now();
      if (note === lastMidiNote && now - lastMidiTime < 400) return;
      lastMidiNote = note; lastMidiTime = now;
      const octave  = Math.floor(note / 12) - 1;
      const noteVal = octave * 7 + 'CDEFGAB'.indexOf(name);
      const clef    = noteVal >= 28 ? 'treble' : 'bass';
      handleAnswer(name, `${name.toLowerCase()}/${octave}`, clef);
    }

    function updateMIDIStatus(inputs) {
      const btn  = document.getElementById('midi-connect-btn');
      const name = document.getElementById('midi-name');
      const connected = inputs.length > 0;
      btn.hidden  = connected;
      name.hidden = !connected;
      if (connected) name.textContent = '⬤ ' + inputs[0].name;
      document.getElementById('answer-row').style.display = connected ? 'none' : '';
    }

    function initMIDI() {
      if (!navigator.requestMIDIAccess) {
        document.getElementById('midi-connect-btn').hidden = true;
        return;
      }
      navigator.requestMIDIAccess().then(access => {
        function attach() {
          access.inputs.forEach(input => { input.onmidimessage = onMIDIMessage; });
          updateMIDIStatus([...access.inputs.values()]);
        }
        attach();
        access.onstatechange = attach;
      }).catch(() => {
        document.getElementById('midi-connect-btn').textContent = 'MIDI unavailable';
      });
    }

    document.getElementById('midi-connect-btn').addEventListener('click', initMIDI);

    // ── Init ─────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const saved = loadTexts();
      trebleTextarea.value = saved.treble || DEFAULT_TREBLE;
      bassTextarea.value   = saved.bass   || DEFAULT_BASS;
      pool = [
        ...parseClef(trebleTextarea.value, 'treble'),
        ...parseClef(bassTextarea.value, 'bass'),
      ];
      newBatch();
      updateStreak();
      startQuestion();
    });
  </script>
</body>
</html>
