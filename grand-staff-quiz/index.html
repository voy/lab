<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grand-staff-quiz</title>
  <style>
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --accent-dim:  #1f6feb;
      --correct:     #2ea043;
      --correct-dim: #1a7431;
      --wrong:       #da3633;
      --wrong-dim:   #a3211e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #main-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 12px;
      gap: 8px;
    }

    #staff-container {
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      cursor: default;
    }

    #staff-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    #controls {
      width: 100%;
      max-width: 600px;
      padding: 8px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #answer-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .ans-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      max-width: 64px;
      height: 52px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
    }
    @media (hover: hover) {
      .ans-btn:hover:not(:disabled) { border-color: var(--accent-dim); }
    }
    .ans-btn:disabled { opacity: 0.5; cursor: default; }
    .ans-btn.correct { background: var(--correct);  border-color: var(--correct-dim); color: #fff; }
    .ans-btn.wrong   { background: var(--wrong);    border-color: var(--wrong-dim);   color: #fff; }

    #footer-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 2px;
    }

    #settings-btn, #toggle-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    #settings-btn:hover, #toggle-btn:hover { color: var(--text); }

    #config-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 4px;
    }
    #config-panel[hidden] { display: none; }

    #config-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    #config-btns {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }
    #reset-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    #reset-btn:hover { color: var(--text); }
    #config-done-btn {
      background: var(--surface);
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 20px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #config-done-btn:hover { border-color: #58a6ff; }

    #streak-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 16px;
    }

    /* ── Modal ── */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modal-backdrop.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #modal-title { font-size: 15px; font-weight: 600; }
    #modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }
    #modal-close:hover { color: var(--text); }

    .modal-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #midi-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    #midi-connect-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #midi-connect-btn:hover { border-color: var(--accent-dim); }
    #midi-name { color: var(--correct); font-size: 13px; }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .setting-row input[type="checkbox"] { cursor: pointer; accent-color: var(--accent-dim); width: 15px; height: 15px; }
    .setting-row input[type="number"] {
      width: 48px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      padding: 2px 6px;
      text-align: center;
    }

    #textareas-row {
      display: flex;
      gap: 12px;
    }
    .clef-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .clef-editor label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .clef-textarea {
      width: 100%;
      height: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.8;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
    }
    .clef-textarea:focus { border-color: var(--accent-dim); }

    #modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 14px 20px;
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #modal-done-btn {
      background: var(--bg);
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 20px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #modal-done-btn:hover { border-color: #58a6ff; }


@media (max-width: 440px) {
      #main-area  { padding: 12px 8px 8px; }
      #controls   { padding: 8px 8px 16px; }
      #staff-container { padding: 6px 6px; }
      .ans-btn    { height: 44px; font-size: 16px; border-radius: 6px; }
      #answer-row { gap: 6px; }
    }
  </style>
</head>
<body>
  <main id="main-area">
    <div id="streak-row">
      <span id="accuracy"></span>
      <span id="speed"></span>
      <span id="streak-current"></span>
    </div>
    <div id="staff-container"></div>
  </main>

<footer id="controls">
    <div id="answer-row">
      <button class="ans-btn" data-note="A">A</button>
      <button class="ans-btn" data-note="B">B</button>
      <button class="ans-btn" data-note="C">C</button>
      <button class="ans-btn" data-note="D">D</button>
      <button class="ans-btn" data-note="E">E</button>
      <button class="ans-btn" data-note="F">F</button>
      <button class="ans-btn" data-note="G">G</button>
    </div>
    <div id="footer-bar">
      <button id="settings-btn">settings</button>
      <button id="toggle-btn">edit notes</button>
    </div>
    <div id="config-panel" hidden>
      <p id="config-desc">Choose which notes to drill. Prefix a line with # to skip it temporarily.</p>
      <div id="textareas-row">
        <div class="clef-editor">
          <label for="treble-textarea">Treble</label>
          <textarea id="treble-textarea" class="clef-textarea" spellcheck="false"></textarea>
        </div>
        <div class="clef-editor">
          <label for="bass-textarea">Bass</label>
          <textarea id="bass-textarea" class="clef-textarea" spellcheck="false"></textarea>
        </div>
      </div>
      <div id="config-btns">
        <button id="reset-btn">Reset to defaults</button>
        <button id="config-done-btn">Done</button>
      </div>
    </div>
  </footer>

  <div id="modal-backdrop">
    <div id="modal">
      <div id="modal-header">
        <span id="modal-title">Settings</span>
        <button id="modal-close">&#x2715;</button>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">MIDI</div>
        <div id="midi-row">
          <button id="midi-connect-btn">Connect MIDI</button>
          <span id="midi-name" hidden></span>
        </div>
        <label class="setting-row">
          <input type="checkbox" id="ignore-octave-check"> Match note name only (ignore octave)
        </label>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Display</div>
        <label class="setting-row">
          <input type="checkbox" id="show-stats-check"> Show performance stats
        </label>
        <div class="setting-row">
          <input type="number" id="batch-size-input" min="1" max="4" value="1"> Bars per batch
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Debug</div>
        <label class="setting-row">
          <input type="checkbox" id="click-clef-check"> Click staff to answer
        </label>
      </div>

      <div id="modal-footer">
        <button id="modal-done-btn">Done</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vexflow@4/build/cjs/vexflow.js"></script>
  <script src="quiz-logic.js"></script>
  <script>
    // ── Default note pool ────────────────────────────────────────────
    const DEFAULT_TREBLE = `B3
C4
D4
E4
F4
G4
A4
B4
C5
D5
E5
F5
G5
A5`;
    const DEFAULT_BASS   = `E2
F2
G2
A2
B2
C3
D3
E3
F3
G3
A3
B3
C4
D4
E4`;

    const STORAGE_KEY = 'grand-staff-pool-v2';

    function loadTexts() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    function saveTexts(treble, bass) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        treble: treble.replace(/\\n/g, '\n'),
        bass:   bass.replace(/\\n/g, '\n'),
      }));
    }

    // ── VexFlow constants ────────────────────────────────────────────
    const { Renderer, Stave, StaveNote, GhostNote, Voice, Formatter, StaveConnector } = Vex.Flow;

    const STAFF_WIDTH   = 400;
    const STAFF_LEFT    = 56;
    const STAVE_WIDTH   = STAFF_WIDTH - STAFF_LEFT - 8;
    const TREBLE_Y      = 35;
    const BASS_Y        = 185;
    const NOTES_PER_BAR = 4;
    const BAR_WIDTH     = 220;

    const staffContainer = document.getElementById('staff-container');

    function applyViewBox() {
      const svg = staffContainer.querySelector('svg');
      const w = parseFloat(svg.getAttribute('width')) || STAFF_WIDTH;
      svg.setAttribute('viewBox', `44 45 ${w - 44} 240`);
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.style.width = '100%';
      svg.style.height = 'auto';
    }

    let trebleStave = null, bassStave = null;

    function buildStaves(ctx) {
      const treble = new Stave(STAFF_LEFT, TREBLE_Y, STAVE_WIDTH);
      treble.addClef('treble');
      treble.setContext(ctx).draw();

      const bass = new Stave(STAFF_LEFT, BASS_Y, STAVE_WIDTH);
      bass.addClef('bass');
      bass.setContext(ctx).draw();

      new StaveConnector(treble, bass).setType(StaveConnector.type.BRACE).setContext(ctx).draw();
      new StaveConnector(treble, bass).setType(StaveConnector.type.SINGLE).setContext(ctx).draw();

      trebleStave = treble;
      bassStave   = bass;
      return { treble, bass };
    }

    // ── Staff click → note ───────────────────────────────────────────
    function yToNote(stave, svgY, clef) {
      const half    = stave.getSpacingBetweenLines() / 2;
      const bottomY = stave.getYForLine(4);
      const steps   = Math.round((bottomY - svgY) / half);
      return stepToNote(steps, clef);
    }

    const ignoreOctaveCheck = document.getElementById('ignore-octave-check');
    ignoreOctaveCheck.checked = localStorage.getItem('ignore-octave') === 'true';
    ignoreOctaveCheck.addEventListener('change', () => {
      localStorage.setItem('ignore-octave', ignoreOctaveCheck.checked);
    });

    const batchSizeInput = document.getElementById('batch-size-input');
    batchSizeInput.value = localStorage.getItem('batch-bars') ?? '1';
    batchSizeInput.addEventListener('change', () => {
      const v = Math.max(1, Math.min(4, parseInt(batchSizeInput.value) || 1));
      batchSizeInput.value = v;
      localStorage.setItem('batch-bars', v);
    });
    batchSizeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { batchSizeInput.blur(); closeSettings(); }
    });

    const showStatsCheck = document.getElementById('show-stats-check');
    showStatsCheck.checked = localStorage.getItem('show-stats') === 'true';
    function applyShowStats() {
      localStorage.setItem('show-stats', showStatsCheck.checked);
      document.getElementById('streak-row').style.visibility = showStatsCheck.checked ? '' : 'hidden';
    }
    showStatsCheck.addEventListener('change', applyShowStats);
    applyShowStats();

    let midiConnected = false;
    function updateAnswerRowVisibility() {
      document.getElementById('answer-row').style.display =
        (midiConnected || clickClefCheck.checked) ? 'none' : '';
    }

    const clickClefCheck = document.getElementById('click-clef-check');
    clickClefCheck.checked = localStorage.getItem('click-clef') === 'true';
    function applyClickClef() {
      localStorage.setItem('click-clef', clickClefCheck.checked);
      staffContainer.style.cursor = clickClefCheck.checked ? 'crosshair' : 'default';
      updateAnswerRowVisibility();
    }
    clickClefCheck.addEventListener('change', applyClickClef);
    applyClickClef();

    staffContainer.addEventListener('click', e => {
      if (!clickClefCheck.checked || !trebleStave || !bassStave) return;
      const svg = staffContainer.querySelector('svg');
      if (!svg) return;
      const pt  = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const { x: svgX, y: svgY } = pt.matrixTransform(svg.getScreenCTM().inverse());

      // Ignore clicks outside the stave x-range (clef area)
      if (svgX < STAFF_LEFT) return;

      const trebleCenter = (trebleStave.getYForLine(0) + trebleStave.getYForLine(4)) / 2;
      const bassCenter   = (bassStave.getYForLine(0)   + bassStave.getYForLine(4))   / 2;
      const clef  = Math.abs(svgY - trebleCenter) <= Math.abs(svgY - bassCenter) ? 'treble' : 'bass';
      const stave = clef === 'treble' ? trebleStave : bassStave;
      const note  = yToNote(stave, svgY, clef);
      if (!note) return;
      handleAnswer(note.name, note.key, clef);
    });

    function renderBatch(notes, currentIdx, feedbackColor = null, wrongNote = null) {
      staffContainer.innerHTML = '';
      const numBars    = Math.max(1, Math.ceil(notes.length / NOTES_PER_BAR));
      const totalWidth = STAFF_LEFT + numBars * BAR_WIDTH;

      const renderer = new Renderer(staffContainer, Renderer.Backends.SVG);
      renderer.resize(totalWidth, 265);
      const ctx = renderer.getContext();

      // Build one stave pair per bar; bar 0 carries the clef and brace
      const tStaves = [], bStaves = [];
      for (let b = 0; b < numBars; b++) {
        const x = STAFF_LEFT + b * BAR_WIDTH;
        const t  = new Stave(x, TREBLE_Y, BAR_WIDTH);
        const bs = new Stave(x, BASS_Y,   BAR_WIDTH);
        if (b === 0) {
          t.addClef('treble');
          bs.addClef('bass');
          new StaveConnector(t, bs).setType(StaveConnector.type.BRACE).setContext(ctx).draw();
          new StaveConnector(t, bs).setType(StaveConnector.type.SINGLE).setContext(ctx).draw();
        }
        t.setContext(ctx).draw();
        bs.setContext(ctx).draw();
        tStaves.push(t);
        bStaves.push(bs);
      }
      trebleStave = tStaves[0];
      bassStave   = bStaves[0];

      const COLOR_DONE    = '#ccc';
      const COLOR_CURRENT = '#000';

      // Pad partial last bar with nulls so notes anchor to the left
      const padBar = offset => {
        const raw = notes.slice(offset, offset + NOTES_PER_BAR);
        return raw.length < NOTES_PER_BAR
          ? [...raw, ...Array(NOTES_PER_BAR - raw.length).fill(null)]
          : raw;
      };

      const styledNote = (key, clef, color) => {
        const sn = new StaveNote({ keys: [key], duration: 'q', clef });
        sn.setStyle({ fillStyle: color, strokeStyle: color });
        sn.setStemStyle({ strokeStyle: 'rgba(0,0,0,0)', fillStyle: 'rgba(0,0,0,0)' });
        return sn;
      };

      const drawBar = (tickables, stave) => {
        const fmtW = stave.getX() + stave.getWidth() - stave.getNoteStartX() - 10;
        const voice = new Voice({ num_beats: NOTES_PER_BAR, beat_value: 4 });
        voice.addTickables(tickables);
        new Formatter().joinVoices([voice]).format([voice], fmtW);
        voice.draw(ctx, stave);
      };

      for (let b = 0; b < numBars; b++) {
        const offset   = b * NOTES_PER_BAR;
        const barNotes = padBar(offset);
        ['treble', 'bass'].forEach(clef => {
          const tickables = barNotes.map((n, i) => {
            const gi = offset + i;
            if (n !== null && n.clef === clef) {
              const color = gi < currentIdx  ? (batchFeedback[gi] ?? COLOR_DONE)
                          : gi === currentIdx ? (feedbackColor ?? COLOR_CURRENT)
                          :                    COLOR_DONE;
              return styledNote(n.key, clef, color);
            }
            return new GhostNote({ duration: 'q' });
          });
          drawBar(tickables, clef === 'treble' ? tStaves[b] : bStaves[b]);
        });
      }

      // Wrong note: second voice on the same bar as currentIdx
      if (wrongNote) {
        const wrongBar = Math.floor(currentIdx / NOTES_PER_BAR);
        const offset   = wrongBar * NOTES_PER_BAR;
        const tickables = padBar(offset).map((_, i) =>
          offset + i === currentIdx
            ? styledNote(wrongNote.key, wrongNote.clef, '#da3633')
            : new GhostNote({ duration: 'q' }));
        drawBar(tickables, wrongNote.clef === 'treble' ? tStaves[wrongBar] : bStaves[wrongBar]);
      }

      applyViewBox();
    }


    function renderConfigView(notes) {
      staffContainer.innerHTML = '';
      const renderer = new Renderer(staffContainer, Renderer.Backends.SVG);
      renderer.resize(STAFF_WIDTH, 265);
      const ctx = renderer.getContext();
      const { treble, bass } = buildStaves(ctx);

      try {
        ['treble', 'bass'].forEach(clef => {
          const sample = (notes || []).filter(n => n.clef === clef);
          if (sample.length === 0) return;
          const staveNotes = sample.map(n => new StaveNote({ keys: [n.key], duration: 'q', clef }));
          const voice = new Voice({ num_beats: sample.length, beat_value: 4 });
          voice.addTickables(staveNotes);
          new Formatter().joinVoices([voice]).format([voice], STAVE_WIDTH - 20);
          voice.draw(ctx, clef === 'treble' ? treble : bass);
        });
      } catch (_) { /* VexFlow can't fit notes — show empty staves */ }

      applyViewBox();
    }

    // ── State ────────────────────────────────────────────────────────
    let pool        = [];
    let currentNote = null;
    let batch         = [];
    let batchFeedback = [];
    let batchIdx      = 0;
    let phase       = 'idle';
    let configOpen  = false;
    let streak          = 0;
    let answerHistory   = [];
    let speedHistory    = [];
    let questionStartTime = 0;

    let lastStepDir     = 0;
    let lastClefRun     = 0;

    // ── Game logic ───────────────────────────────────────────────────
    function newBatch(prevNote = null) {
      const size = Math.min((parseInt(batchSizeInput.value) || 1) * NOTES_PER_BAR, pool.length);
      const result = buildBatch(weightedShuffle(pool), prevNote, lastStepDir, lastClefRun, size);
      batch         = addIntervals(result.batch, pool.length);
      lastStepDir   = result.lastDir;
      lastClefRun   = result.clefRun;
      batchIdx      = 0;
      batchFeedback = [];
    }

    function startQuestion() {
      if (pool.length === 0) return;
      if (batchIdx >= batch.length) {
        disableButtons();
        setTimeout(() => {
          newBatch(currentNote);
          currentNote = batch[batchIdx++];
          phase = 'question';
          questionStartTime = Date.now();
          renderBatch(batch, batchIdx - 1);
          enableButtons();
        }, 250);
        return;
      }
      currentNote = batch[batchIdx++];
      phase = 'question';
      questionStartTime = Date.now();
      renderBatch(batch, batchIdx - 1);

      enableButtons();
    }

    let feedbackTimer = null;

    function handleAnswer(name, key = null, clef = null) {
      if (phase === 'feedback' && feedbackTimer !== null) {
        clearTimeout(feedbackTimer);
        feedbackTimer = null;
        startQuestion();
      }
      if (phase !== 'question') return;
      phase = 'feedback';

      const isCorrect = isCorrectAnswer(name, key, currentNote, ignoreOctaveCheck.checked);

      document.querySelector(`.ans-btn[data-note="${name}"]`)
        .classList.add(isCorrect ? 'correct' : 'wrong');

      answerHistory.push(isCorrect);
      if (answerHistory.length > ACCURACY_WINDOW) answerHistory.shift();
      if (isCorrect) {
        streak++;
        speedHistory.push(Date.now() - questionStartTime);
        if (speedHistory.length > SPEED_WINDOW) speedHistory.shift();
      } else {
        streak = 0;
      }
      updateStreak();

      if (isCorrect) {
        batchFeedback[batchIdx - 1] = '#57ab6e';
        renderBatch(batch, batchIdx - 1, '#2ea043');
        startQuestion();
      } else {
        const wrongIdx = batchIdx - 1;
        batchFeedback[wrongIdx] = '#e09000';
        const wrongNote = key !== null ? { name, key, clef } : null;
        renderBatch(batch, wrongIdx, '#e09000', wrongNote);
        feedbackTimer = setTimeout(() => {
          feedbackTimer = null;
          if (batchIdx >= batch.length) {
            newBatch(currentNote);
            currentNote = batch[batchIdx++];
            phase = 'question';
            renderBatch(batch, batchIdx - 1);
            enableButtons();
          } else {
            startQuestion();
          }
        }, 700);
      }

      setTimeout(clearFeedback, 400);
    }

    function updateStreak() {
      const stats = computeStats(answerHistory, speedHistory);
      const pct = stats.accuracyPct === null ? '—' : `${stats.accuracyPct}%`;
      document.getElementById('accuracy').textContent = `accuracy: ${pct} (${stats.accuracyLabel})`;
      document.getElementById('speed').textContent = stats.speedMs !== null
        ? `speed: ${(stats.speedMs / 1000).toFixed(1)}s (${stats.speedLabel})`
        : '';
      document.getElementById('streak-current').textContent = `streak: ${streak}`;
    }

    function enableButtons()  { document.querySelectorAll('.ans-btn').forEach(b => b.disabled = false); }
    function disableButtons() { document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true); }
    function clearFeedback()  { document.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('correct', 'wrong')); }

    // ── Settings modal ───────────────────────────────────────────────
    const trebleTextarea = document.getElementById('treble-textarea');
    const bassTextarea   = document.getElementById('bass-textarea');
    const modalBackdrop  = document.getElementById('modal-backdrop');
    const configPanel    = document.getElementById('config-panel');
    const toggleBtn      = document.getElementById('toggle-btn');

    function pauseGame() {
      configOpen = true;
      phase = 'feedback';
      disableButtons();
      clearFeedback();
    }

    function resumeGame() {
      configOpen = false;
      lastStepDir = 0;
      lastClefRun = 0;
      newBatch();
      startQuestion();
    }

    function openSettings() {
      pauseGame();
      modalBackdrop.classList.add('open');
    }

    function closeSettings() {
      modalBackdrop.classList.remove('open');
      if (!configPanel.hidden) return; // note editor still open, don't restart
      resumeGame();
    }

    function openConfig() {
      pauseGame();
      configPanel.hidden = false;
      toggleBtn.style.display = 'none';
      renderConfigView(pool);
    }

    function closeConfig() {
      configPanel.hidden = true;
      toggleBtn.style.display = '';
      resumeGame();
    }

    function refreshPool() {
      const parsed = [
        ...parseClef(trebleTextarea.value, 'treble'),
        ...parseClef(bassTextarea.value, 'bass'),
      ];
      if (parsed.length > 0) {
        pool = parsed;
        saveTexts(trebleTextarea.value, bassTextarea.value);
        renderConfigView(pool);
      }
    }

    let debounceTimer;
    [trebleTextarea, bassTextarea].forEach(ta => {
      ta.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(refreshPool, 300);
      });
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      trebleTextarea.value = DEFAULT_TREBLE;
      bassTextarea.value   = DEFAULT_BASS;
      pool = [
        ...parseClef(DEFAULT_TREBLE, 'treble'),
        ...parseClef(DEFAULT_BASS, 'bass'),
      ];
      saveTexts(DEFAULT_TREBLE, DEFAULT_BASS);
      renderConfigView(pool);
    });

    document.getElementById('modal-done-btn').addEventListener('click', closeSettings);
    document.getElementById('modal-close').addEventListener('click', closeSettings);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeSettings(); });
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    document.getElementById('config-done-btn').addEventListener('click', closeConfig);
    toggleBtn.addEventListener('click', openConfig);

    // ── Wire answer events ───────────────────────────────────────────
    document.querySelectorAll('.ans-btn').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn.dataset.note));
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && configOpen) {
        if (!modalBackdrop.classList.contains('open') && !configPanel.hidden) closeConfig();
        else closeSettings();
        return;
      }
      if (e.target.tagName === 'TEXTAREA' || configOpen) return;
      const note = e.key.toUpperCase();
      if ('ABCDEFG'.includes(note) && note.length === 1) handleAnswer(note);
    });

    // ── MIDI ─────────────────────────────────────────────────────────
    let lastMidiNote = -1, lastMidiTime = 0;

    function onMIDIMessage(e) {
      const [status, note, velocity] = e.data;
      if ((status & 0xf0) !== 0x90 || velocity === 0) return;
      const parsed = midiToNote(note);
      if (!parsed) return;
      const now = Date.now();
      if (note === lastMidiNote && now - lastMidiTime < 400) return;
      lastMidiNote = note; lastMidiTime = now;
      handleAnswer(parsed.name, parsed.key, parsed.clef);
    }

    function updateMIDIStatus(inputs) {
      const btn  = document.getElementById('midi-connect-btn');
      const name = document.getElementById('midi-name');
      midiConnected = inputs.length > 0;
      btn.hidden  = midiConnected;
      name.hidden = !midiConnected;
      if (midiConnected) name.textContent = '⬤ ' + inputs[0].name;
      updateAnswerRowVisibility();
    }

    function initMIDI() {
      if (!navigator.requestMIDIAccess) {
        document.getElementById('midi-connect-btn').hidden = true;
        return;
      }
      navigator.requestMIDIAccess().then(access => {
        function attach() {
          access.inputs.forEach(input => { input.onmidimessage = onMIDIMessage; });
          updateMIDIStatus([...access.inputs.values()]);
        }
        attach();
        access.onstatechange = attach;
      }).catch(() => {
        document.getElementById('midi-connect-btn').textContent = 'MIDI unavailable';
      });
    }

    document.getElementById('midi-connect-btn').addEventListener('click', initMIDI);

    // ── Init ─────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const saved = loadTexts();
      trebleTextarea.value = saved.treble || DEFAULT_TREBLE;
      bassTextarea.value   = saved.bass   || DEFAULT_BASS;
      pool = [
        ...parseClef(trebleTextarea.value, 'treble'),
        ...parseClef(bassTextarea.value, 'bass'),
      ];
      newBatch();
      updateStreak();
      startQuestion();
    });
  </script>
</body>
</html>
