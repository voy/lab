<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Type Talk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #eee;
    }

    /* ── Input screen ── */
    #input-screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 16px;
      gap: 12px;
    }

    #text-input {
      flex: 1;
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      font-size: 22px;
      color: #eee;
      resize: none;
      outline: none;
      line-height: 1.5;
      -webkit-appearance: none;
    }
    #text-input::placeholder { color: #555; }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .icon-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 1.5px solid #333;
      background: #1c1c1e;
      color: #eee;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    #mic-btn.listening {
      background: #8b0000;
      border-color: #ff3b30;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(255,59,48,0); }
    }

    #show-btn {
      flex: 1;
      height: 60px;
      border-radius: 14px;
      border: none;
      background: #fff;
      color: #111;
      font-size: 19px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.3px;
      -webkit-tap-highlight-color: transparent;
    }
    #show-btn:active { background: #ddd; }

    /* ── Display screen ── */
    #display-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      color: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 0;
    }
    #display-screen.active { display: flex; }

    #display-text {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
      word-break: break-word;
      max-width: 100%;
      overflow-y: auto;
    }

    .display-actions {
      display: flex;
      width: 100%;
      gap: 10px;
      padding: 16px 0 calc(16px + env(safe-area-inset-bottom, 0px));
      flex-shrink: 0;
      align-items: center;
    }

    #back-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      border: none;
      background: #e5e5ea;
      color: #999;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #delete-back-btn {
      flex: 1;
      height: 56px;
      border-radius: 14px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* mic unavailable */
    #mic-btn.unavailable {
      opacity: 0.25;
      cursor: default;
    }
  </style>
</head>
<body>

<div id="input-screen">
  <textarea id="text-input" placeholder="Napište zprávu…" autofocus></textarea>
  <div class="controls">
    <button class="icon-btn" id="mic-btn" title="Nadiktovat zprávu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="9" y1="21" x2="15" y2="21"/>
      </svg>
    </button>
    <button id="show-btn">Ukázat →</button>
    <button class="icon-btn" id="clear-btn" title="Smazat">✕</button>
  </div>
</div>

<div id="display-screen">
  <div id="display-text"></div>
  <div class="display-actions">
    <button id="back-btn">← Zpět</button>
    <button id="delete-back-btn">Smazat a zpět</button>
  </div>
</div>

<script>
  const textarea     = document.getElementById('text-input');
  const displayScreen = document.getElementById('display-screen');
  const displayText  = document.getElementById('display-text');
  const micBtn       = document.getElementById('mic-btn');
  const showBtn      = document.getElementById('show-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const backBtn      = document.getElementById('back-btn');
  const deleteBackBtn = document.getElementById('delete-back-btn');

  // ── Show / hide display ──────────────────────────────────────────────
  showBtn.addEventListener('click', () => {
    const text = textarea.value.trim();
    if (!text) return;
    displayText.textContent = text;
    displayText.style.fontSize = scaledFontSize(text);
    displayScreen.classList.add('active');
    textarea.blur();
    requestWakeLock();
  });

  function goBack() {
    displayScreen.classList.remove('active');
    releaseWakeLock();
    textarea.focus();
  }

  backBtn.addEventListener('click', goBack);

  deleteBackBtn.addEventListener('click', () => {
    textarea.value = '';
    goBack();
  });

  // ── Clear ────────────────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    textarea.value = '';
    textarea.focus();
  });

  // ── Enter: send from input, delete & back from display ───────────────
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();
      showBtn.click();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && displayScreen.classList.contains('active')) {
      e.preventDefault();
      deleteBackBtn.click();
    }
  });

  // ── Font size: step function on character count ──────────────────────
  function scaledFontSize(text) {
    const n = text.length;
    if (n <=  8) return '20vw';
    if (n <= 16) return '15vw';
    if (n <= 35) return '11vw';
    if (n <= 70) return '8vw';
    return '6vw';
  }

  // ── Wake Lock (prevents screen dimming while grandma reads) ──────────
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
  }
  function releaseWakeLock() {
    wakeLock?.release().catch(() => {});
    wakeLock = null;
  }

  // ── Speech recognition ───────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    micBtn.classList.add('unavailable');
    micBtn.disabled = true;
  } else {
    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'cs-CZ';

    let listening = false;
    let committedText = '';

    micBtn.addEventListener('click', () => {
      if (listening) { rec.stop(); return; }
      committedText = textarea.value;
      rec.start();
    });

    rec.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
    };

    rec.onresult = (e) => {
      let finalChunk = '';
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalChunk += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      if (finalChunk) {
        committedText += (committedText && !committedText.endsWith(' ') ? ' ' : '') + finalChunk.trim();
      }
      textarea.value = committedText + (interim ? ' ' + interim : '');
    };

    rec.onend = () => {
      listening = false;
      micBtn.classList.remove('listening');
    };

    rec.onerror = (e) => {
      if (e.error !== 'aborted') console.warn('Speech error:', e.error);
      listening = false;
      micBtn.classList.remove('listening');
    };
  }
</script>
</body>
</html>
